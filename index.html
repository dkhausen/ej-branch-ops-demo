<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Operations Portal</title>
  <meta name="description" content="Branch Operations Support — deposit & wire status and case follow-up. Demo environment with fictitious data." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" class="logo-icon" aria-hidden="true"><path d="M4 7h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 12h16" stroke="currentColor" stroke-width="1.6"/></svg>
        <span>Branch Operations</span>
      </div>
      <nav class="nav">
        <a href="#/dashboard" class="nav-item" data-route="dashboard">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#/deposits" class="nav-item" data-route="deposits">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h14l-3-3M21 17H7l3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Deposits &amp; Wires
        </a>
        <a href="#/cases" class="nav-item" data-route="cases">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          Cases
        </a>
        <a href="#/team" class="nav-item" data-route="team">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.6M17 20a5.5 5.5 0 0 0-2.8-4.8" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          Team
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="avatar">JD</div>
        <div>
          <div class="su-name">Jane Doe</div>
          <div class="su-role">Branch Ops Associate</div>
        </div>
      </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main" id="view"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
