<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Doe Financial — Claims</title>
  <meta name="description" content="Claims management portal — demo environment with fictitious data." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" class="logo-icon" aria-hidden="true"><path d="M4 7h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 12h16" stroke="currentColor" stroke-width="1.6"/></svg>
        <span>John Doe Financial</span>
      </div>
      <nav class="nav">
        <a href="#/dashboard" class="nav-item" data-route="dashboard">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#/claims" class="nav-item" data-route="claims">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l5 5v13H7z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M14 3v5h5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          All Claims
        </a>
        <a href="#/adjusters" class="nav-item" data-route="adjusters">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.6M17 20a5.5 5.5 0 0 0-2.8-4.8" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          Adjusters
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="avatar">JD</div>
        <div>
          <div class="su-name">Jane Doe</div>
          <div class="su-role">Senior Adjuster</div>
        </div>
      </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main" id="view"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
